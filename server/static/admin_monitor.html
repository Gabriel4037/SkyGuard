<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SkyGuard Admin Monitor</title>
  <style>
    :root{
      --bg:#08111f;
      --panel:#0f1b2d;
      --panel-2:#13233a;
      --text:#e6edf7;
      --muted:#9fb2c9;
      --line:rgba(159,178,201,0.16);
      --blue:#49a6ff;
      --green:#37d67a;
      --amber:#f6b73c;
      --red:#f06161;
      --shadow:0 18px 48px rgba(0,0,0,0.28);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Segoe UI, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 540px at 12% -8%, rgba(73,166,255,0.18), transparent 60%),
        radial-gradient(700px 480px at 100% 0%, rgba(55,214,122,0.12), transparent 55%),
        var(--bg);
    }
    .wrap{max-width:1280px;margin:0 auto;padding:24px 18px 40px}
    .hero,.card,.empty-state{
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(17,31,50,0.96), rgba(12,22,36,0.96));
      box-shadow:var(--shadow);
      border-radius:22px;
    }
    .hero{padding:22px}
    .hero-top{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:start}
    .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#8ed1ff}
    h1{margin:10px 0 6px;font-size:30px}
    .sub{color:var(--muted);font-size:14px}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    button{
      border:0;border-radius:12px;padding:10px 14px;font-weight:700;cursor:pointer
    }
    .ghost{background:rgba(255,255,255,0.06);color:var(--text);border:1px solid var(--line)}
    .danger{background:var(--red);color:#fff}
    .status-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .pill{
      display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;
      border:1px solid var(--line);background:rgba(255,255,255,0.04);font-size:13px;color:var(--muted)
    }
    .dot{width:10px;height:10px;border-radius:999px;background:var(--green);box-shadow:0 0 0 6px rgba(55,214,122,0.12)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(360px, 1fr));gap:16px;margin-top:20px}
    .card{overflow:hidden}
    .card-head{display:flex;justify-content:space-between;gap:12px;padding:16px 16px 12px;border-bottom:1px solid var(--line)}
    .title{font-size:18px;font-weight:800}
    .meta{font-size:12px;color:var(--muted);line-height:1.6}
    .chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .chip{padding:5px 8px;border-radius:999px;font-size:12px;border:1px solid var(--line);background:rgba(255,255,255,0.06)}
    .chip.online{color:#c9f5db;border-color:rgba(55,214,122,0.28)}
    .chip.detecting{color:#ffe3aa;border-color:rgba(246,183,60,0.3)}
    .frame-wrap{aspect-ratio:16/9;background:#030712}
    .frame-wrap img{display:block;width:100%;height:100%;object-fit:cover;background:#030712}
    .empty-state{margin-top:20px;padding:32px;text-align:center;color:var(--muted)}
    @media (max-width:900px){
      .hero-top{grid-template-columns:1fr}
      .actions{justify-content:flex-start}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-top">
        <div>
          <div class="eyebrow">Central Server</div>
          <h1>Admin Monitor</h1>
          <div class="sub">Live camera feeds from online clients</div>
        </div>
        <div class="actions">
          <button class="ghost" id="backBtn">Back to Dashboard</button>
          <button class="danger" id="logoutBtn">Logout</button>
        </div>
      </div>
      <div class="status-row">
        <div class="pill"><span class="dot"></span><span id="monitorStatus">Waiting for cameras...</span></div>
        <div class="pill">Last refresh: <strong id="lastRefresh" style="color:var(--text)">-</strong></div>
      </div>
    </section>

    <div id="cameras-grid" class="grid"></div>
    <div id="emptyState" class="empty-state" style="display:none;">No online cameras.</div>
  </div>

  <script src="/static/auth.js"></script>
  <script>
    const apiFetch = (window.authApi && window.authApi.apiFetch) || window.apiFetch;
    let cameraPollId = null;
    let framePollId = null;
    let heartbeatPollId = null;
    let currentCameras = [];
    const viewerId = `viewer_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;

    function formatDateTime(value) {
      if (!value) return '-';
      const dt = new Date(value);
      if (Number.isNaN(dt.getTime())) return value;
      return dt.toLocaleString();
    }

    function renderCameras(cameras) {
      currentCameras = cameras || [];
      const grid = document.getElementById('cameras-grid');
      const empty = document.getElementById('emptyState');
      grid.innerHTML = '';

      if (!currentCameras.length) {
        empty.style.display = 'block';
        document.getElementById('monitorStatus').textContent = 'No online cameras';
        return;
      }

      empty.style.display = 'none';
      document.getElementById('monitorStatus').textContent = `${currentCameras.length} online camera(s)`;

      currentCameras.forEach((camera) => {
        const card = document.createElement('section');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-head">
            <div>
              <div class="title">${camera.camera_name}</div>
              <div class="meta">
                <div>User: ${camera.username}</div>
                <div>Camera ID: ${camera.internal_id}</div>
                <div>Last seen: ${formatDateTime(camera.last_seen_at)}</div>
              </div>
            </div>
            <div class="chips">
              <span class="chip online">Online</span>
              <span class="chip ${camera.is_detecting ? 'detecting' : ''}">${camera.is_detecting ? 'Detecting' : 'Idle'}</span>
            </div>
          </div>
          <div class="frame-wrap">
            <img class="stream-frame" data-camera-id="${camera.internal_id}" alt="${camera.camera_name}" />
          </div>
        `;
        grid.appendChild(card);
      });

      refreshFrames();
    }

    function refreshFrames() {
      document.querySelectorAll('.stream-frame').forEach((img) => {
        const cameraId = img.dataset.cameraId;
        img.src = `/api/admin/camera/frame?camera_id=${cameraId}&t=${Date.now()}`;
      });
    }

    async function loadCameras() {
      try {
        const data = await apiFetch('/api/admin/cameras', { method: 'GET' });
        renderCameras(data.cameras || []);
        document.getElementById('lastRefresh').textContent = new Date().toLocaleTimeString();
      } catch (error) {
        document.getElementById('monitorStatus').textContent = error.error || error.message || 'Monitor unavailable';
        renderCameras([]);
      }
    }

    async function sendHeartbeat() {
      try {
        await apiFetch('/api/admin/monitor/heartbeat', {
          method: 'POST',
          body: { viewer_id: viewerId }
        });
      } catch (_) {}
    }

    async function ensureAdmin() {
      const me = await apiFetch('/api/auth/me', { method: 'GET' });
      if (!me || !me.user || me.user.role !== 'admin') {
        window.location.replace('/login.html');
        return false;
      }
      return true;
    }

    async function logout() {
      try {
        await apiFetch('/api/auth/logout', { method: 'POST' });
      } finally {
        window.location.replace('/login.html');
      }
    }

    document.getElementById('backBtn').addEventListener('click', () => {
      window.location.replace('/index.html');
    });
    document.getElementById('logoutBtn').addEventListener('click', logout);

    window.addEventListener('load', async () => {
      try {
        const ok = await ensureAdmin();
        if (!ok) return;
        await sendHeartbeat();
        await loadCameras();
        heartbeatPollId = setInterval(sendHeartbeat, 3000);
        cameraPollId = setInterval(loadCameras, 4000);
        framePollId = setInterval(refreshFrames, 1000);
      } catch (_) {
        window.location.replace('/login.html');
      }
    });

    window.addEventListener('beforeunload', () => {
      if (heartbeatPollId) clearInterval(heartbeatPollId);
      if (cameraPollId) clearInterval(cameraPollId);
      if (framePollId) clearInterval(framePollId);
    });
  </script>
</body>
</html>
