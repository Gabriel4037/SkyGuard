<!doctype html>
<html lang="en">
<!-- Central live monitor page. Active client nodes stream frames here only while this page is open. -->
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SkyGuard Admin Monitor</title>
  <style>
    :root{
      --bg:#08111f;
      --panel:#0f1b2d;
      --panel-2:#13233a;
      --text:#e6edf7;
      --muted:#9fb2c9;
      --line:rgba(159,178,201,0.16);
      --blue:#49a6ff;
      --green:#37d67a;
      --amber:#f6b73c;
      --red:#f06161;
      --shadow:0 18px 48px rgba(0,0,0,0.28);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Segoe UI, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 540px at 12% -8%, rgba(73,166,255,0.18), transparent 60%),
        radial-gradient(700px 480px at 100% 0%, rgba(55,214,122,0.12), transparent 55%),
        var(--bg);
    }
    .wrap{max-width:1280px;margin:0 auto;padding:24px 18px 40px}
    .hero,.card,.empty-state{
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(17,31,50,0.96), rgba(12,22,36,0.96));
      box-shadow:var(--shadow);
      border-radius:22px;
    }
    .hero{padding:22px}
    .hero-top{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:start}
    .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#8ed1ff}
    h1{margin:10px 0 6px;font-size:30px}
    .sub{color:var(--muted);font-size:14px}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    button{border:0;border-radius:12px;padding:10px 14px;font-weight:700;cursor:pointer}
    .ghost{background:rgba(255,255,255,0.06);color:var(--text);border:1px solid var(--line)}
    .status-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .pill{
      display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;
      border:1px solid var(--line);background:rgba(255,255,255,0.04);font-size:13px;color:var(--muted)
    }
    .dot{width:10px;height:10px;border-radius:999px;background:var(--green);box-shadow:0 0 0 6px rgba(55,214,122,0.12)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(360px, 1fr));gap:16px;margin-top:20px}
    .card{overflow:hidden}
    .card-head{display:flex;justify-content:space-between;gap:12px;padding:16px 16px 12px;border-bottom:1px solid var(--line)}
    .title{font-size:18px;font-weight:800}
    .meta{font-size:12px;color:var(--muted);line-height:1.6}
    .chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;align-items:center}
    .chip{
      display:inline-flex;
      align-items:center;
      gap:7px;
      padding:6px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:700;
      letter-spacing:.04em;
      text-transform:uppercase;
      border:1px solid rgba(159,178,201,0.14);
      background:rgba(255,255,255,0.04);
      color:var(--muted);
    }
    .chip::before{
      content:"";
      width:8px;
      height:8px;
      border-radius:999px;
      background:currentColor;
      box-shadow:0 0 0 4px rgba(255,255,255,0.06);
      flex:0 0 auto;
    }
    .chip.online{
      color:#8ee6b3;
      background:rgba(55,214,122,0.10);
      border-color:rgba(55,214,122,0.18);
    }
    .chip.idle{
      color:#8fb0d6;
      background:rgba(73,166,255,0.10);
      border-color:rgba(73,166,255,0.18);
    }
    .chip.detecting{
      color:#ffd27d;
      background:rgba(246,183,60,0.12);
      border-color:rgba(246,183,60,0.20);
    }
    .frame-wrap{
      position:relative;
      width:100%;
      aspect-ratio:16/9;
      background:rgba(2,6,23,0.5);
      border-top:1px solid var(--line);
      overflow:hidden;
    }
    .frame-wrap img{
      display:block;
      width:100%;
      height:100%;
      object-fit:contain;
      background:#030712;
    }
    .empty-state{margin-top:20px;padding:32px;text-align:center;color:var(--muted)}
    .text-strong{color:var(--text)}
    .hidden{display:none}
    @media (max-width:900px){
      .hero-top{grid-template-columns:1fr}
      .actions{justify-content:flex-start}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-top">
        <div>
          <div class="eyebrow">Central Server</div>
          <h1>Admin Monitor</h1>
          <div class="sub">Live camera feeds from online clients</div>
        </div>
        <div class="actions">
          <button class="ghost" id="backBtn">Back to Dashboard</button>
        </div>
      </div>
      <div class="status-row">
        <div class="pill"><span class="dot"></span><span id="monitorStatus">Waiting for cameras...</span></div>
        <div class="pill">Last refresh: <strong id="lastRefresh" class="text-strong">-</strong></div>
      </div>
    </section>

    <div id="cameras-grid" class="grid"></div>
    <div id="emptyState" class="empty-state hidden">No online cameras.</div>
  </div>

  <script src="/static/auth.js"></script>
  <script>
    const { apiFetch, requireAdmin, safeReplace } = window.authApi || {};
    let cameraPollId = null;
    let framePollId = null;
    let heartbeatPollId = null;
    let currentCameras = [];
    const cameraCardMap = new Map();
    const viewerId = `viewer_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;

    function formatDateTime(value) {
      if (!value) return '-';
      const dt = new Date(value);
      if (Number.isNaN(dt.getTime())) return value;
      return dt.toLocaleString();
    }

    function formatClock(value = new Date()) {
      const dt = value instanceof Date ? value : new Date(value);
      if (Number.isNaN(dt.getTime())) return '-';
      return dt.toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });
    }

    function createCameraCard(camera) {
      const card = document.createElement('section');
      card.className = 'card';
      card.dataset.cameraId = String(camera.internal_id);
      card.innerHTML = `
        <div class="card-head">
          <div>
            <div class="title"></div>
            <div class="meta">
              <div class="meta-user"></div>
              <div class="meta-camera-id"></div>
              <div class="meta-last-seen"></div>
            </div>
          </div>
          <div class="chips">
            <span class="chip online">Online</span>
            <span class="chip chip-detect"></span>
          </div>
        </div>
        <div class="frame-wrap">
          <img class="stream-frame" alt="" />
        </div>
      `;
      cameraCardMap.set(String(camera.internal_id), card);
      updateCameraCard(card, camera);
      return card;
    }

    function updateCameraCard(card, camera) {
      card.querySelector('.title').textContent = camera.camera_name;
      card.querySelector('.meta-user').textContent = `User: ${camera.username}`;
      card.querySelector('.meta-camera-id').textContent = `Camera ID: ${camera.internal_id}`;
      card.querySelector('.meta-last-seen').textContent = `Last seen: ${formatDateTime(camera.last_seen_at)}`;

      const detectChip = card.querySelector('.chip-detect');
      detectChip.textContent = camera.is_detecting ? 'Detecting' : 'Idle';
      detectChip.className = `chip chip-detect ${camera.is_detecting ? 'detecting' : 'idle'}`;

      const img = card.querySelector('.stream-frame');
      img.dataset.cameraId = String(camera.internal_id);
      img.alt = camera.camera_name;
    }

    function renderCameras(cameras) {
      currentCameras = cameras || [];
      const grid = document.getElementById('cameras-grid');
      const empty = document.getElementById('emptyState');

      if (!currentCameras.length) {
        for (const card of cameraCardMap.values()) card.remove();
        cameraCardMap.clear();
        empty.classList.remove('hidden');
        document.getElementById('monitorStatus').textContent = 'No online cameras';
        return;
      }

      empty.classList.add('hidden');
      document.getElementById('monitorStatus').textContent = `${currentCameras.length} online camera(s)`;

      const nextIds = new Set(currentCameras.map((camera) => String(camera.internal_id)));
      for (const [cameraId, card] of Array.from(cameraCardMap.entries())) {
        if (!nextIds.has(cameraId)) {
          card.remove();
          cameraCardMap.delete(cameraId);
        }
      }

      currentCameras.forEach((camera) => {
        const cameraId = String(camera.internal_id);
        let card = cameraCardMap.get(cameraId);
        if (!card) {
          card = createCameraCard(camera);
          grid.appendChild(card);
        } else {
          updateCameraCard(card, camera);
        }
      });

      refreshFrames();
    }

    function refreshFrames() {
      document.querySelectorAll('.stream-frame').forEach((img) => {
        if (img.dataset.loading === 'true') return;
        const cameraId = img.dataset.cameraId;
        if (!cameraId) return;
        const nextSrc = `/api/admin/camera/frame?camera_id=${cameraId}&t=${Date.now()}`;
        const preload = new Image();
        img.dataset.loading = 'true';
        preload.onload = () => {
          img.src = nextSrc;
          img.dataset.loading = 'false';
        };
        preload.onerror = () => {
          img.dataset.loading = 'false';
        };
        preload.src = nextSrc;
      });
    }

    async function loadCameras() {
      try {
        const data = await apiFetch('/api/admin/cameras', { method: 'GET' });
        renderCameras(data.cameras || []);
        document.getElementById('lastRefresh').textContent = formatClock();
      } catch (error) {
        document.getElementById('monitorStatus').textContent = error.error || error.message || 'Monitor unavailable';
        renderCameras([]);
      }
    }

    async function sendHeartbeat() {
      try {
        await apiFetch('/api/admin/monitor/heartbeat', {
          method: 'POST',
          body: { viewer_id: viewerId }
        });
      } catch (_) {}
    }

    document.getElementById('backBtn').addEventListener('click', () => {
      safeReplace('/index.html');
    });

    window.addEventListener('load', async () => {
      try {
        const ok = await requireAdmin();
        if (!ok) return;
        await sendHeartbeat();
        await loadCameras();
        heartbeatPollId = setInterval(sendHeartbeat, 3000);
        cameraPollId = setInterval(loadCameras, 4000);
        framePollId = setInterval(refreshFrames, 1000);
      } catch (_) {
        safeReplace('/login.html');
      }
    });

    window.addEventListener('beforeunload', () => {
      if (heartbeatPollId) clearInterval(heartbeatPollId);
      if (cameraPollId) clearInterval(cameraPollId);
      if (framePollId) clearInterval(framePollId);
    });
  </script>
</body>
</html>
