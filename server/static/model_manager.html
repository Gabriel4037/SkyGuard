<!doctype html>
<html lang="en">
<!-- Central model manager: admins release YOLO weights and tune threat policy values. -->
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Model Center - SkyGuard Central Admin</title>
  <style>
    :root{
      --bg:#08111f;
      --panel:#0f1b2d;
      --panel-2:#13233a;
      --text:#e6edf7;
      --muted:#9fb2c9;
      --line:rgba(159,178,201,0.16);
      --blue:#49a6ff;
      --green:#37d67a;
      --red:#f06161;
      --shadow:0 18px 48px rgba(0,0,0,0.28);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      padding:24px 18px 40px;
      font-family:Segoe UI, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 540px at 12% -8%, rgba(73,166,255,0.18), transparent 60%),
        radial-gradient(700px 480px at 100% 0%, rgba(55,214,122,0.12), transparent 55%),
        var(--bg);
    }
    .card{
      max-width:960px;
      margin:12px auto;
      padding:20px;
      border:1px solid var(--line);
      border-radius:22px;
      background:linear-gradient(180deg, rgba(17,31,50,0.96), rgba(12,22,36,0.96));
      box-shadow:var(--shadow);
    }
    h2,h3{margin:0 0 10px}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .row > *{flex:1;min-width:180px}
    button{
      padding:10px 12px;
      border:0;
      background:var(--blue);
      color:#fff;
      border-radius:10px;
      cursor:pointer;
      font-weight:700;
    }
    button.ghost{
      background:rgba(255,255,255,0.06);
      color:var(--text);
      border:1px solid var(--line);
    }
    .muted{color:var(--muted);font-size:13px}
    .good{color:#86efac}
    .bad{color:#fca5a5}
    .pill{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      background:rgba(73,166,255,0.12);
      color:#8ed1ff;
      font-size:12px;
      border:1px solid rgba(73,166,255,0.18);
    }
    .meta{line-height:1.7;font-size:14px}
    input[type=file], input[type=number]{
      width:100%;
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius:10px;
      background:rgba(2,6,23,0.58);
      color:var(--text);
    }
    .hint{color:var(--muted);font-size:13px;margin-top:10px;line-height:1.5}
    .row-end{flex:0 0 auto}
    .top-gap{margin-top:10px}
    .msg-gap{margin-top:10px}
  </style>
</head>
<body>
  <div class="card">
    <div class="row">
      <div>
        <h2>Model Center</h2>
        <div class="muted">Release an approved `.pt` model.</div>
      </div>
      <div class="row-end">
        <button id="backBtn" class="ghost">Back to Dashboard</button>
      </div>
    </div>
  </div>

  <div class="card">
    <h3>Current Released Model</h3>
    <div id="currentMeta" class="meta muted">Loading model info...</div>
  </div>

  <div class="card">
    <h3>Release New Model</h3>
    <div class="row top-gap">
      <div>
        <input id="modelFile" type="file" accept=".pt" />
      </div>
      <div class="row-end">
        <button id="releaseBtn">Release Model</button>
      </div>
    </div>
    <div id="releaseMsg" class="muted msg-gap"></div>
    <div class="hint">Release the approved `.pt` file here.</div>
  </div>

  <div class="card">
    <h3>Threat Policy</h3>
    <div class="row top-gap">
      <div>
        <label class="muted">Detection confidence cap</label>
        <input id="detectionConfidenceCap" type="number" min="5" max="95" step="1" value="40" />
      </div>
      <div>
        <label class="muted">Medium confidence threshold</label>
        <input id="mediumConfidence" type="number" min="5" max="99" step="1" value="75" />
      </div>
      <div>
        <label class="muted">Medium box size %</label>
        <input id="mediumBoxPct" type="number" min="0.1" max="80" step="0.1" value="8" />
      </div>
      <div>
        <label class="muted">High threat time (seconds)</label>
        <input id="highZoneSeconds" type="number" min="1" max="120" step="1" value="3" />
      </div>
      <div class="row-end">
        <button id="savePolicyBtn">Save Policy</button>
      </div>
    </div>
    <div id="policyMsg" class="muted msg-gap"></div>
    <div class="hint">Clients pull this policy after login, similar to the current model release.</div>
  </div>

  <script src="/static/auth.js"></script>
  <script>
    const { apiFetch, requireAdmin, safeReplace } = window.authApi || {};
    const currentMeta = document.getElementById('currentMeta');
    const releaseMsg = document.getElementById('releaseMsg');
    const policyMsg = document.getElementById('policyMsg');
    const detectionConfidenceCap = document.getElementById('detectionConfidenceCap');
    const mediumConfidence = document.getElementById('mediumConfidence');
    const mediumBoxPct = document.getElementById('mediumBoxPct');
    const highZoneSeconds = document.getElementById('highZoneSeconds');

    document.getElementById('backBtn').addEventListener('click', () => {
      safeReplace('/index.html');
    });

    async function loadCurrentModel() {
      try {
        const res = await apiFetch('/api/models/current', { method: 'GET' });
        const model = res.model;
        currentMeta.innerHTML = `
          <div><span class="pill">Released</span></div>
          <div><strong>Version:</strong> ${model.version || '-'}</div>
          <div><strong>Filename:</strong> ${model.filename || '-'}</div>
          <div><strong>Released By:</strong> ${model.released_by || '-'}</div>
          <div><strong>Released At:</strong> ${model.released_at || '-'}</div>
          <div><strong>Size:</strong> ${model.size_bytes || 0} bytes</div>
        `;
        currentMeta.className = 'meta';
      } catch (_) {
        currentMeta.textContent = 'No released model yet.';
        currentMeta.className = 'meta bad';
      }
    }

    async function loadThreatPolicy() {
      try {
        const res = await apiFetch('/api/threat-policy', { method: 'GET' });
        const policy = res.policy || {};
        detectionConfidenceCap.value = String(Math.round((policy.detection_confidence_cap ?? 0.4) * 100));
        mediumConfidence.value = String(Math.round((policy.medium_confidence ?? 0.75) * 100));
        mediumBoxPct.value = String(policy.medium_box_pct ?? 8);
        highZoneSeconds.value = String(policy.high_zone_seconds ?? 3);
        policyMsg.textContent = 'Policy loaded.';
        policyMsg.className = 'good';
      } catch (error) {
        policyMsg.textContent = error.error || error.message || 'Unable to load threat policy.';
        policyMsg.className = 'bad';
      }
    }

    document.getElementById('releaseBtn').addEventListener('click', async () => {
      const fileInput = document.getElementById('modelFile');
      const file = fileInput.files && fileInput.files[0];
      if (!file) {
        releaseMsg.textContent = 'Choose a .pt file first.';
        releaseMsg.className = 'bad';
        return;
      }

      const formData = new FormData();
      formData.append('file', file);

      try {
        const response = await fetch('/api/models/release', {
          method: 'POST',
          credentials: 'include',
          body: formData
        });
        const data = await response.json();
        if (!response.ok || !data.ok) throw new Error(data.error || 'Release failed');
        releaseMsg.textContent = `Released ${data.model.filename}`;
        releaseMsg.className = 'good';
        await loadCurrentModel();
      } catch (error) {
        releaseMsg.textContent = error.message || 'Release failed';
        releaseMsg.className = 'bad';
      }
    });

    document.getElementById('savePolicyBtn').addEventListener('click', async () => {
      try {
        const payload = {
          detection_confidence_cap: (Number(detectionConfidenceCap.value) || 40) / 100,
          medium_confidence: (Number(mediumConfidence.value) || 75) / 100,
          medium_box_pct: Number(mediumBoxPct.value) || 8,
          high_zone_seconds: Number(highZoneSeconds.value) || 3
        };
        const res = await apiFetch('/api/threat-policy', {
          method: 'POST',
          body: payload
        });
        policyMsg.textContent = `Saved policy: detection cap ${Math.round(res.policy.detection_confidence_cap * 100)}%, medium ${Math.round(res.policy.medium_confidence * 100)}%, box ${res.policy.medium_box_pct}%, high after ${res.policy.high_zone_seconds}s`;
        policyMsg.className = 'good';
      } catch (error) {
        policyMsg.textContent = error.error || error.message || 'Policy save failed';
        policyMsg.className = 'bad';
      }
    });

    (async () => {
      try {
        const ok = await requireAdmin();
        if (ok) {
          await loadCurrentModel();
          await loadThreatPolicy();
        }
      } catch (_) {
        safeReplace('/login.html');
      }
    })();
  </script>
</body>
</html>
