<!doctype html>
<html lang="en">
<!-- Central user management page for creating users, roles, passwords, and registration settings. -->
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>User Management - SkyGuard Central Admin</title>
  <style>
    :root{
      --bg:#08111f;
      --panel:#0f1b2d;
      --panel-2:#13233a;
      --text:#e6edf7;
      --muted:#9fb2c9;
      --line:rgba(159,178,201,0.16);
      --blue:#49a6ff;
      --green:#37d67a;
      --red:#f06161;
      --shadow:0 18px 48px rgba(0,0,0,0.28);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      padding:24px 18px 40px;
      font-family:Segoe UI, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 540px at 12% -8%, rgba(73,166,255,0.18), transparent 60%),
        radial-gradient(700px 480px at 100% 0%, rgba(55,214,122,0.12), transparent 55%),
        var(--bg);
    }
    .card{
      max-width:1080px;
      margin:0 auto;
      padding:22px;
      border:1px solid var(--line);
      border-radius:22px;
      background:linear-gradient(180deg, rgba(17,31,50,0.96), rgba(12,22,36,0.96));
      box-shadow:var(--shadow);
    }
    h2{margin:0 0 14px;font-size:30px}
    strong{color:var(--text)}
    hr{
      border:0;
      height:1px;
      background:var(--line);
      margin:18px 0;
    }
    table{width:100%;border-collapse:collapse}
    th,td{
      padding:10px 8px;
      border-bottom:1px solid rgba(159,178,201,0.12);
      text-align:left;
      vertical-align:top;
    }
    th{
      color:var(--muted);
      font-size:12px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    input[type=text], select, input[type=password]{
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius:10px;
      width:100%;
      box-sizing:border-box;
      background:rgba(2,6,23,0.58);
      color:var(--text);
    }
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .row > *{flex:1;min-width:160px}
    button{
      padding:10px 12px;
      border:0;
      background:var(--blue);
      color:#fff;
      border-radius:10px;
      cursor:pointer;
      font-weight:700;
    }
    .ghost{
      background:rgba(255,255,255,0.06);
      color:var(--text);
      border:1px solid var(--line);
    }
    .danger{background:var(--red)}
    .top-actions{margin-top:8px}
    .top-actions .ghost{margin-bottom:8px}
    .section{margin-bottom:12px}
    .section-head{margin-top:8px}
    .toggle-row{margin-top:8px;display:flex;align-items:center;gap:10px}
    .toggle-label{display:flex;align-items:center;gap:8px;margin:0}
    .checkbox-inline{width:auto}
    .status-error{color:#fca5a5;margin-top:6px}
    .status-muted{color:var(--muted);margin-top:6px}
    .table-top{margin-top:8px}
  </style>
</head>
<body>
  <div class="card">
    <h2>User Management</h2>
    <div class="top-actions">
      <button id="backBtn" class="ghost">Back to Dashboard</button>
    </div>
    <div class="section">
      <strong>Create User</strong>
      <div class="row section-head">
        <input id="newUsername" placeholder="Username" />
        <input id="newPassword" type="password" placeholder="Password" />
        <select id="newRole">
          <option value="user">user</option>
          <option value="admin">admin</option>
        </select>
        <button id="createBtn">Create</button>
      </div>
      <div id="createMsg" class="status-error"></div>
    </div>

    <hr/>

    <div class="section">
      <strong>Client Registration</strong>
      <div class="toggle-row">
        <label class="toggle-label">
          <input id="clientRegistrationEnabled" type="checkbox" class="checkbox-inline" />
          <span>Allow client sign-up</span>
        </label>
      </div>
      <div id="settingsMsg" class="status-muted"></div>
    </div>

    <hr/>

    <div>
      <strong>Existing Users</strong>
      <table id="usersTable" class="table-top">
        <thead><tr><th>ID</th><th>Username</th><th>Role</th><th>Created At</th><th>Last Login</th><th>Actions</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script src="/static/auth.js"></script>
  <script>
    const { apiFetch, requireAdmin, safeReplace } = window.authApi || {};
    const backBtn = document.getElementById('backBtn');
    const registrationToggle = document.getElementById('clientRegistrationEnabled');
    const settingsMsg = document.getElementById('settingsMsg');
    if (backBtn) {
      backBtn.addEventListener('click', () => {
        safeReplace('/index.html');
      });
    }

    async function loadSettings() {
      try {
        const res = await apiFetch('/api/admin/settings', { method: 'GET' });
        registrationToggle.checked = !!res?.settings?.client_registration_enabled;
        settingsMsg.style.color = 'var(--muted)';
        settingsMsg.textContent = registrationToggle.checked
          ? 'Client sign-up is on.'
          : 'Client sign-up is off.';
      } catch (err) {
        settingsMsg.style.color = '#fca5a5';
        settingsMsg.textContent = 'Failed to load setting.';
      }
    }

    async function loadUsers() {
      try {
        const res = await apiFetch('/api/users', { method: 'GET' });
        const tbody = document.querySelector('#usersTable tbody');
        tbody.innerHTML = '';
        if (!res || !Array.isArray(res.users)) {
          tbody.innerHTML = '<tr><td colspan="6">Failed to load</td></tr>';
          return;
        }
        res.users.forEach(u => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${u.id}</td>
            <td><input data-id="${u.id}" class="u-username" value="${u.username}" /></td>
            <td>
              <select data-id="${u.id}" class="u-role">
                <option ${u.role==='user'?'selected':''} value="user">user</option>
                <option ${u.role==='admin'?'selected':''} value="admin">admin</option>
              </select>
            </td>
            <td>${u.created_at || ''}</td>
            <td>${u.last_login || ''}</td>
            <td>
              <button class="saveBtn" data-id="${u.id}">Save</button>
              <button class="pwBtn" data-id="${u.id}">Change Password</button>
              <button class="delBtn danger" data-id="${u.id}">Delete</button>
            </td>
          `;
          tbody.appendChild(tr);
        });

        document.querySelectorAll('.saveBtn').forEach(b => {
          b.addEventListener('click', async () => {
            const id = b.dataset.id;
            const username = document.querySelector(`.u-username[data-id="${id}"]`).value.trim();
            const role = document.querySelector(`.u-role[data-id="${id}"]`).value;
            try {
              const r = await apiFetch('/api/users/update', { method: 'POST', body: { id, username, role } });
              if (r.ok) { alert('Saved successfully'); loadUsers(); }
              else alert(r.error || 'Save failed');
            } catch (err) { alert('Save failed'); }
          });
        });

        document.querySelectorAll('.pwBtn').forEach(b => {
          b.addEventListener('click', async () => {
            const id = b.dataset.id;
            const pwd = prompt('Enter new password (leave blank to cancel):');
            if (!pwd) return;
            try {
              const r = await apiFetch('/api/users/set_password', { method: 'POST', body: { id, password: pwd } });
              if (r.ok) alert('Password updated');
              else alert(r.error || 'Operation failed');
            } catch (err) { alert('Operation failed'); }
          });
        });

        document.querySelectorAll('.delBtn').forEach(b => {
          b.addEventListener('click', async () => {
            const id = b.dataset.id;
            if (!confirm('Confirm delete this user?')) return;
            try {
              const r = await apiFetch('/api/users/delete', { method: 'POST', body: { id } });
              if (r.ok) { alert('Deleted successfully'); loadUsers(); }
              else alert(r.error || 'Delete failed');
            } catch (err) { alert('Delete failed'); }
          });
        });

      } catch (err) {
        const tbody = document.querySelector('#usersTable tbody');
        tbody.innerHTML = '<tr><td colspan="6">Failed to load</td></tr>';
      }
    }

    document.getElementById('createBtn').addEventListener('click', async () => {
      const username = document.getElementById('newUsername').value.trim();
      const password = document.getElementById('newPassword').value;
      const role = document.getElementById('newRole').value;
      const msg = document.getElementById('createMsg');
      msg.textContent = '';
      if (!username || !password) { msg.textContent = 'Username and password are required'; return; }
      try {
        const r = await apiFetch('/api/users/create', { method: 'POST', body: { username, password, role } });
        if (r.ok) {
          msg.style.color = '#86efac';
          msg.textContent = 'User created successfully';
          document.getElementById('newUsername').value = '';
          document.getElementById('newPassword').value = '';
          loadUsers();
        } else {
          msg.style.color = '#fca5a5';
          msg.textContent = r.error || 'Creation failed';
        }
      } catch (err) {
        msg.style.color = '#fca5a5';
        msg.textContent = 'Creation failed';
      }
    });

    registrationToggle.addEventListener('change', async () => {
      settingsMsg.style.color = 'var(--muted)';
      settingsMsg.textContent = 'Saving...';
      try {
        const r = await apiFetch('/api/admin/settings', {
          method: 'POST',
          body: { client_registration_enabled: registrationToggle.checked },
        });
        registrationToggle.checked = !!r?.settings?.client_registration_enabled;
        settingsMsg.textContent = registrationToggle.checked
          ? 'Client sign-up is on.'
          : 'Client sign-up is off.';
      } catch (err) {
        registrationToggle.checked = !registrationToggle.checked;
        settingsMsg.style.color = '#fca5a5';
        settingsMsg.textContent = 'Failed to save setting.';
      }
    });

    (async () => {
      try {
        const me = await requireAdmin();
        if (!me) return;
        await loadSettings();
        await loadUsers();
      } catch (e) {
        safeReplace('/login.html');
      }
    })();
  </script>
</body>
</html>
