<!doctype html>
<html lang="en">
<!-- Central admin login page. Only admin users are allowed into the management dashboard. -->
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SkyGuard Central Admin Login</title>
  <style>
    :root{
      --bg:#08111f;
      --panel:#0f1b2d;
      --panel-2:#13233a;
      --text:#e6edf7;
      --muted:#9fb2c9;
      --muted-soft:#7f97b2;
      --line:rgba(159,178,201,0.16);
      --blue:#49a6ff;
      --green:#37d67a;
      --red:#f06161;
      --shadow:0 18px 48px rgba(0,0,0,0.28);
    }
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
      font-family:Segoe UI, Arial, sans-serif;color:var(--text);
      background:
        radial-gradient(900px 540px at 12% -8%, rgba(73,166,255,0.18), transparent 60%),
        radial-gradient(700px 480px at 100% 0%, rgba(55,214,122,0.12), transparent 55%),
        var(--bg);
      padding:18px;
    }
    .shell{
      display:grid;
      grid-template-columns:1.08fr .92fr;
      max-width:980px;
      width:100%;
      border-radius:26px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }
    .brand{
      padding:42px;
      background:linear-gradient(160deg, rgba(12,29,50,0.98), rgba(13,45,82,0.92));
      border:1px solid var(--line);
    }
    .eyebrow{
      font-size:12px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:#8ed1ff;
    }
    .brand h1{
      margin:12px 0 10px;
      font-size:40px;
      line-height:1.04;
    }
    .brand p{
      margin:0;
      color:var(--muted);
      line-height:1.65;
      max-width:430px;
      font-size:14px;
    }
    .brand .badge{
      display:inline-flex;align-items:center;gap:10px;margin-top:24px;padding:10px 14px;
      border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,0.05);color:var(--muted);font-size:13px
    }
    .dot{width:10px;height:10px;border-radius:999px;background:var(--green);box-shadow:0 0 0 6px rgba(55,214,122,0.12)}
    .card{
      padding:38px 32px;
      background:linear-gradient(180deg, rgba(15,27,45,0.98), rgba(10,20,35,0.98));
      border:1px solid var(--line);
      border-left:none;
      display:flex;align-items:center;
    }
    .panel{width:100%}
    h2{margin:0 0 8px;font-size:24px}
    .sub{color:var(--muted);margin-bottom:22px;line-height:1.55}
    .field{margin-top:16px}
    label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
    input{
      width:100%;
      padding:12px 13px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,0.04);
      color:var(--text);
      outline:none;
      transition:border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }
    input:focus{
      border-color:rgba(73,166,255,0.42);
      box-shadow:0 0 0 4px rgba(73,166,255,0.10);
      background:rgba(255,255,255,0.06);
    }
    .row{display:flex;gap:10px;margin-top:18px;justify-content:stretch}
    button{
      padding:10px 14px;border:0;border-radius:12px;cursor:pointer;font-weight:700;
      font-size:14px;transition:transform .18s ease, box-shadow .18s ease, background .18s ease
    }
    button:hover{transform:translateY(-1px)}
    button.primary{width:100%;background:var(--blue);color:#fff}
    button.primary:disabled{opacity:.72;cursor:default;transform:none}
    .msg{color:#ffc5c5;margin-top:12px;min-height:20px;font-size:13px;line-height:1.45}
    .foot{
      margin-top:18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      color:var(--muted);
      font-size:12px;
      padding-top:14px;
      border-top:1px solid var(--line);
    }
    .mini{display:inline-flex;align-items:center;gap:8px;color:var(--muted)}
    .mini-dot{width:8px;height:8px;box-shadow:none}
    @media (max-width:860px){
      .shell{grid-template-columns:1fr}
      .card{border-left:1px solid var(--line);border-top:none}
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="brand">
      <div class="eyebrow">Central Server</div>
      <h1>SkyGuard Admin</h1>
      <p>Admin access.</p>
      <div class="badge">
        <span class="dot"></span>
        <span>Admin only</span>
      </div>
    </section>

    <section class="card">
      <div class="panel">
        <h2>Admin Sign In</h2>
        <div class="sub">Sign in.</div>
        <div class="field">
          <label>Username</label>
          <input id="loginUsername" type="text" autocomplete="username" />
        </div>
        <div class="field">
          <label>Password</label>
          <input id="loginPassword" type="password" autocomplete="current-password" />
        </div>
        <div class="row">
          <button id="loginSubmit" class="primary">Continue</button>
        </div>
        <div class="msg" id="loginMsg"></div>
        <div class="foot">
          <span class="mini"><span class="dot mini-dot"></span>Admin only</span>
          <span>SkyGuard</span>
        </div>
      </div>
    </section>
  </div>

  <script src="/static/auth.js"></script>
  <script>
    const { authLogin, refreshCurrentUser, authLogout, waitForSessionReady, safeReplace } = window.authApi || {};

    async function submitLogin() {
      const user = document.getElementById('loginUsername').value.trim();
      const pwd = document.getElementById('loginPassword').value;
      const submitBtn = document.getElementById('loginSubmit');
      const msgEl = document.getElementById('loginMsg');
      msgEl.textContent = '';
      if (!user || !pwd) {
        msgEl.textContent = 'Username and password required';
        return;
      }

      try {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing in...';
        await authLogin({ username: user, password: pwd });
        const currentUser = await waitForSessionReady();
        if (!currentUser) throw { error: 'Session did not become ready' };
        if (currentUser.role !== 'admin') {
          try { await authLogout(); } catch (_) {}
          throw { error: 'Admin account required' };
        }
        safeReplace('/index.html');
      } catch (err) {
        msgEl.textContent = err.error || err.message || 'Login failed';
        window.__auth_redirecting = false;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Continue';
      }
    }

    document.getElementById('loginSubmit').addEventListener('click', submitLogin);
    document.getElementById('loginPassword').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitLogin();
    });
    document.getElementById('loginUsername').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitLogin();
    });

    (async () => {
      try {
        await new Promise((resolve) => setTimeout(resolve, 80));
        const user = await refreshCurrentUser();
        if (user && user.role === 'admin') {
          safeReplace('/index.html');
        } else if (user) {
          try { await authLogout(); } catch (_) {}
          window.__auth_redirecting = false;
        }
      } catch (_) {
        window.__auth_redirecting = false;
      }
    })();
  </script>
</body>
</html>
