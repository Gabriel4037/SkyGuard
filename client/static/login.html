<!doctype html>
<html lang="en">
<!-- Client login page. Users authenticate against the central server through the local node app. -->
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SkyGuard Detector Client Login</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; background:#f5f7fa; margin:0; display:flex; align-items:center; justify-content:center; height:100vh; }
    .card { background:#fff; padding:24px; width:400px; border-radius:8px; box-shadow:0 6px 18px rgba(0,0,0,0.08); }
    h2 { margin:0 0 12px 0; font-size:20px; }
    label { display:block; font-size:13px; margin-top:8px; }
    input { width:100%; padding:10px; margin-top:6px; box-sizing:border-box; }
    .row { display:flex; gap:8px; margin-top:14px; justify-content:flex-end; }
    button { padding:8px 12px; border:0; background:#0078D7; color:#fff; border-radius:6px; cursor:pointer; }
    button.secondary { background:#6c757d; }
    .msg { color:#c00; margin-top:10px; min-height:18px; }
    .status { margin-top:10px; font-size:12px; color:#495057; min-height:18px; }
    .status.ok { color:#198754; }
    .hidden { display:none !important; }
  </style>
</head>
<body>
  <div class="card">
    <div style="font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:#0b5cff; margin-bottom:8px;">Detector Client</div>
    <h2>Sign in</h2>
    <label>Server IP</label>
    <input id="serverIp" type="text" placeholder="192.168.1.50" />
    <div class="row" style="margin-top:10px; justify-content:flex-start;">
      <button id="connectBtn">Connect</button>
    </div>
    <div class="status" id="connectMsg"></div>
    <label>Username</label>
    <input id="loginUsername" type="text" autocomplete="username" />
    <label>Password</label>
    <input id="loginPassword" type="password" autocomplete="current-password" />
    <div class="row">
      <button id="gotoRegister" class="secondary hidden">Register</button>
      <button id="loginSubmit">Login</button>
    </div>
    <div class="msg" id="loginMsg"></div>
  </div>

  <script src="/static/auth.js"></script>
  <script>
    const { authLogin, refreshCurrentUser, waitForSessionReady, safeReplace, getClientConnection, setClientConnection, testClientConnection, getClientRegistrationStatus } = window.authApi || {};
    let isConnected = false;
    let registrationPollTimer = null;
    let registrationUiLoaded = false;
    let registrationEnabled = null;

    function setConnectStatus(text, ok = false) {
      const el = document.getElementById('connectMsg');
      el.textContent = text || '';
      el.className = ok ? 'status ok' : 'status';
      isConnected = !!ok;
    }

    async function loadConnection() {
      try {
        const payload = await getClientConnection();
        if (payload && payload.server_ip) {
          document.getElementById('serverIp').value = payload.server_ip;
        }
      } catch (_) {}
    }

    async function refreshRegistrationUi() {
      const registerBtn = document.getElementById('gotoRegister');

      try {
        const payload = await getClientRegistrationStatus();
        const enabled = !!(payload && payload.enabled);
        if (!registrationUiLoaded || registrationEnabled !== enabled) {
          registrationEnabled = enabled;
          registrationUiLoaded = true;
          if (enabled) {
            registerBtn.classList.remove('hidden');
          } else {
            registerBtn.classList.add('hidden');
          }
        } else {
          return;
        }
      } catch (_) {
        if (!registrationUiLoaded) {
          registerBtn.classList.add('hidden');
          registrationUiLoaded = true;
          registrationEnabled = false;
        }
      }
    }

    function startRegistrationPolling() {
      if (registrationPollTimer) return;
      registrationPollTimer = setInterval(() => {
        if (!document.hidden) {
          refreshRegistrationUi();
        }
      }, 5000);
    }

    function stopRegistrationPolling() {
      if (!registrationPollTimer) return;
      clearInterval(registrationPollTimer);
      registrationPollTimer = null;
    }

    async function connectToServer() {
      const serverIp = document.getElementById('serverIp').value.trim();
      if (!serverIp) {
        setConnectStatus('Server IP required');
        return false;
      }

      try {
        const test = await testClientConnection({ server_ip: serverIp });
        if (!test.ok) throw test;
        const saved = await setClientConnection({ server_ip: serverIp });
        document.getElementById('serverIp').value = saved.server_ip || serverIp;
        localStorage.setItem('client_server_ip', saved.server_ip || serverIp);
        setConnectStatus(`Connected to ${saved.server_url}`, true);
        return true;
      } catch (err) {
        setConnectStatus(err.error || err.message || 'Cannot reach server');
        return false;
      }
    }

    document.getElementById('connectBtn').addEventListener('click', async () => {
      await connectToServer();
    });

    document.getElementById('loginSubmit').addEventListener('click', async () => {
      const user = document.getElementById('loginUsername').value.trim();
      const pwd = document.getElementById('loginPassword').value;
      const msgEl = document.getElementById('loginMsg');
      msgEl.textContent = '';
      if (!isConnected) {
        const ok = await connectToServer();
        if (!ok) {
          msgEl.textContent = 'Connect to the server first';
          return;
        }
      }
      if (!user || !pwd) {
        msgEl.textContent = 'Username and password required';
        return;
      }

      try {
        await authLogin({ username: user, password: pwd });
        const currentUser = await waitForSessionReady();
        if (!currentUser) throw { error: 'Session did not become ready' };
        safeReplace('/index.html');
      } catch (err) {
        msgEl.textContent = err.error || err.message || 'Login failed';
        window.__auth_redirecting = false;
      }
    });

    (async () => {
      try {
        const savedIp = localStorage.getItem('client_server_ip');
        if (savedIp) {
          document.getElementById('serverIp').value = savedIp;
        }
        await loadConnection();
        await refreshRegistrationUi();
        startRegistrationPolling();
        await new Promise((resolve) => setTimeout(resolve, 80));
        const user = await refreshCurrentUser();
        if (user) safeReplace('/index.html');
      } catch (_) {
        window.__auth_redirecting = false;
      }
    })();
    document.getElementById('gotoRegister').addEventListener('click', () => {
      safeReplace('/register.html');
    });
    window.addEventListener('focus', () => {
      refreshRegistrationUi();
    });
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        refreshRegistrationUi();
      }
    });
    window.addEventListener('beforeunload', () => {
      stopRegistrationPolling();
    });
  </script>
</body>
</html>
